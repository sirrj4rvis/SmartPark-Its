global:
  scrape_interval: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: smartpark-web
    metrics_path: /metrics
    static_configs:
      - targets: ["web:5000"]
        labels:
          service: smartpark

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
